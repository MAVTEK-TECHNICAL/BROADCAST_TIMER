<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Broadcast Countdown</title>

<!-- PWA / iOS Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Countdown">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0c10">
<meta name="description" content="Live broadcast countdown timing tool">

<!-- Icons -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

<!-- Prevent tap highlight on iPad -->
<style>
  * { -webkit-tap-highlight-color: transparent; }
  /* Safe area insets for notched iPads */
  #app {
    padding-top: max(8px, env(safe-area-inset-top));
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    padding-left: max(8px, env(safe-area-inset-left));
    padding-right: max(8px, env(safe-area-inset-right));
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d26;
    --border: #2a2e3d;
    --border-bright: #3d4259;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #00ff88;
    --red: #ff3355;
    --yellow: #ffd600;
    --text: #e8ecf4;
    --text-dim: #6b7390;
    --text-mid: #9ba3bf;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Oswald', sans-serif;
    --ui: 'Rajdhani', sans-serif;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--ui);
    -webkit-font-smoothing: antialiased;
    touch-action: manipulation;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex; flex-direction: column;
    height: 100vh; width: 100vw;
    padding: 8px;
    gap: 8px;
  }

  /* ── HUB HEADER ── */
  #hub-bar {
    display: flex; align-items: center;
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-top: 3px solid var(--accent);
    border-radius: 6px;
    padding: 8px 16px;
    gap: 16px;
    flex-shrink: 0;
  }

  .hub-label {
    font-family: var(--display);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .hub-clock {
    font-family: var(--mono);
    font-size: 36px;
    color: #fff;
    letter-spacing: 4px;
    line-height: 1;
    flex: 1;
    text-align: center;
  }

  .tz-selector {
    display: flex; align-items: center; gap: 8px;
  }

  .tz-label {
    font-size: 11px; letter-spacing: 2px;
    color: var(--text-dim); text-transform: uppercase;
  }

  select {
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--ui);
    font-size: 12px;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--accent); }
  option { background: #1a1d26; }
  optgroup { background: #0f1117; color: var(--accent); font-size: 11px; }

  /* ── MATCHES GRID ── */
  #matches-grid {
    display: flex; gap: 8px;
    flex: 1;
    min-height: 0;
  }

  .match-col {
    flex: 1;
    display: flex; flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    min-width: 0;
    transition: opacity 0.3s, filter 0.3s;
  }

  .match-col.disabled {
    opacity: 0.35;
    filter: grayscale(0.6);
    pointer-events: none;
  }

  /* Match header */
  .match-header {
    display: flex; flex-direction: column;
    align-items: center;
    padding: 10px 12px 8px;
    background: var(--surface2);
    border-bottom: 2px solid var(--accent);
    gap: 4px;
    flex-shrink: 0;
    position: relative;
  }

  .match-title {
    font-family: var(--display);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .match-local-time {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.06em;
    line-height: 1;
    width: 100%;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
  }

  .match-tz-row {
    display: flex; align-items: center; gap: 6px;
    width: 100%;
    justify-content: center;
  }

  .match-tz-label {
    font-size: 10px; letter-spacing: 1.5px; color: var(--text-dim); text-transform: uppercase;
  }

  .match-tz-select {
    font-size: 11px; padding: 2px 6px;
  }

  /* Toggle button */
  .toggle-btn {
    position: absolute;
    top: 8px; right: 10px;
    width: 32px; height: 18px;
    background: var(--border);
    border: 1px solid var(--border-bright);
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center;
    padding: 2px;
    pointer-events: all;
  }
  .toggle-btn.on { background: var(--accent); border-color: var(--accent); }
  .toggle-btn::after {
    content: '';
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
    display: block;
  }
  .toggle-btn.on::after { transform: translateX(14px); }

  /* Timer rows */
  .timers-list {
    display: flex; flex-direction: column;
    flex: 1; overflow-y: auto;
    padding: 6px;
    gap: 4px;
  }

  .timer-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    gap: 8px;
    min-height: 48px;
    transition: border-color 0.2s;
  }

  .timer-row.core {
    border-left: 3px solid var(--accent2);
  }

  .timer-row.optional {
    border-left: 3px solid var(--border-bright);
    font-style: italic;
  }

  .timer-row.countdown-warning { border-color: var(--yellow); }
  .timer-row.countdown-live { border-color: var(--red); animation: pulse-border 1s infinite; }

  @keyframes pulse-border {
    0%, 100% { border-color: var(--red); box-shadow: 0 0 0 0 rgba(255,51,85,0); }
    50% { border-color: #ff6680; box-shadow: 0 0 0 3px rgba(255,51,85,0.15); }
  }

  .timer-name {
    font-family: var(--ui);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-mid);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .timer-row.optional .timer-name {
    font-weight: 400;
    font-style: italic;
  }

  .timer-time-set {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-mid);
    letter-spacing: 0.05em;
    cursor: pointer;
    border-bottom: 1px dashed var(--border-bright);
    padding-bottom: 1px;
    white-space: nowrap;
  }
  .timer-time-set:hover { color: var(--accent); border-color: var(--accent); }

  .timer-countdown {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.08em;
    min-width: 60px;
    text-align: right;
    white-space: nowrap;
  }

  .timer-countdown.positive { color: var(--green); }
  .timer-countdown.warning { color: var(--yellow); }
  .timer-countdown.live { color: var(--red); }
  .timer-countdown.past { color: var(--text-dim); }

  /* Add timer button */
  .add-timer-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    background: transparent;
    border: 1px dashed var(--border-bright);
    border-radius: 4px;
    color: var(--text-dim);
    font-family: var(--ui);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .add-timer-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-top: 3px solid var(--accent);
    border-radius: 8px;
    padding: 24px;
    width: 320px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .modal-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .modal-field { display: flex; flex-direction: column; gap: 6px; }
  .modal-field label {
    font-size: 11px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase;
  }

  .modal-input {
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px;
    padding: 8px 12px;
    outline: none;
    width: 100%;
  }
  .modal-input:focus { border-color: var(--accent); }

  .modal-buttons {
    display: flex; gap: 8px; justify-content: flex-end;
  }

  .btn {
    font-family: var(--display);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .btn-cancel {
    background: transparent;
    border-color: var(--border-bright);
    color: var(--text-dim);
  }
  .btn-cancel:hover { border-color: var(--text-mid); color: var(--text); }

  .btn-confirm {
    background: var(--accent);
    color: #000;
  }
  .btn-confirm:hover { background: #33ddff; }

  .btn-danger {
    background: transparent;
    border-color: var(--red);
    color: var(--red);
  }
  .btn-danger:hover { background: rgba(255,51,85,0.1); }

  /* ── STATUS BAR ── */
  #status-bar {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 4px 12px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    margin-right: 6px;
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Scrollbar */
  .timers-list::-webkit-scrollbar { width: 4px; }
  .timers-list::-webkit-scrollbar-track { background: transparent; }
  .timers-list::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  /* Remove timer */
  .timer-remove {
    display: none;
    background: none; border: none;
    color: var(--red); font-size: 14px;
    cursor: pointer; padding: 0 2px; line-height: 1;
    flex-shrink: 0;
  }
  .timer-row.optional:hover .timer-remove { display: block; }
  .timer-row { grid-template-columns: 1fr auto auto auto; }

  .time-picker-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
  }
  .time-text {
    flex: 1;
    font-family: var(--mono) !important;
    font-size: 28px !important;
    padding: 10px 14px !important;
    letter-spacing: 4px;
    text-align: center;
    min-width: 0;
  }
  .time-text::placeholder { color: var(--border-bright); letter-spacing: 3px; }
  .time-text:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,212,255,0.15); }
  .time-colon {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1;
    flex-shrink: 0;
    white-space: nowrap;
    letter-spacing: 1px;
  }
  .time-dropdowns {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .time-sel-sm {
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    color: var(--text-mid);
    font-family: var(--mono);
    font-size: 13px;
    padding: 4px 6px;
    cursor: pointer;
    outline: none;
    width: 72px;
    text-align: center;
  }
  .time-sel-sm:focus { border-color: var(--accent); color: var(--text); }
  .time-sel-sm option { background: #1a1d26; }

  /* ── ADD / REMOVE MATCH ── */
  .hidden-match { display: none; }

  #add-match-col {
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
  }

  .add-match-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 48px;
    background: transparent;
    border: 2px dashed var(--border-bright);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    padding: 12px 0;
  }
  .add-match-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.05);
  }
  .add-match-plus {
    font-size: 24px;
    font-weight: 300;
    line-height: 1;
    font-family: var(--mono);
  }
  .add-match-label {
    font-family: var(--display);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.3;
  }
  #add-match-col.hidden { display: none; }

  /* Remove match button in header */
  .remove-match-btn {
    position: absolute;
    top: 6px; right: 6px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,51,85,0.15);
    border: 1.5px solid var(--red);
    color: var(--red);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: all 0.15s;
    pointer-events: all !important;
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
  }
  .remove-match-btn:hover,
  .remove-match-btn:active {
    background: rgba(255,51,85,0.5);
    transform: scale(1.1);
  }

  /* ── MATCH HEADER EDIT ── */
  .match-title-row {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; width: 100%;
    position: relative;
  }
  .match-label {
    font-family: var(--display);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .edit-match-btn {
    background: none; border: none;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .edit-match-btn:hover { color: var(--accent); }

  .match-teams {
    display: flex; align-items: center; justify-content: center;
    gap: 0.5em;
    min-height: 16px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 24px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
  }
  .team-vs {
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 2px; font-family: var(--ui);
    font-weight: 600;
  }

  /* Colour picker */
  .colour-picker-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    flex-shrink: 0;
  }
  .colour-label {
    font-size: 9px; letter-spacing: 1.5px; color: var(--text-dim);
    text-transform: uppercase;
  }
  .colour-input {
    width: 40px; height: 32px;
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    background: var(--surface2);
    cursor: pointer;
    padding: 2px;
  }
  .colour-input::-webkit-color-swatch-wrapper { padding: 0; }
  .colour-input::-webkit-color-swatch { border: none; border-radius: 3px; }

  /* Section divider inside modal */
  .modal-section-divider {
    font-family: var(--display);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin-top: -4px;
  }
</style>
</head>
<body>
<div id="app">

  <!-- HUB BAR -->
  <div id="hub-bar">
    <div class="hub-label">HUB LOCAL TIME</div>
    <div class="hub-clock" id="hub-clock">--:--:--</div>
    <div class="tz-selector">
      <span class="tz-label">TZ</span>
      <select id="hub-tz" onchange="updateHubTz()"></select>
    </div>
  </div>

  <!-- MATCHES -->
  <div id="matches-grid">
    <!-- Match 1 -->
    <div class="match-col" id="match-col-0">
      <div class="match-header" style="border-top-color: var(--accent)">
        <div class="match-title-row">
          <div class="match-label" id="match-label-0">MATCH 1</div>
          <button class="edit-match-btn" onclick="openEditMatch(0)" title="Edit match details">✎</button>
        </div>
        <div class="match-teams" id="match-teams-0"></div>
        <div class="match-local-time" id="match-clock-0">--:--:--</div>
        <div class="match-tz-row">
          <span class="match-tz-label">TZ</span>
          <select class="match-tz-select" id="match-tz-0" onchange="updateMatchTz(0)"></select>
        </div>
      </div>
      <div class="timers-list" id="timers-0"></div>
      <button class="add-timer-btn" onclick="openAddTimer(0)">+ ADD TIMER</button>
    </div>

    <!-- Match 2 (hidden on startup) -->
    <div class="match-col hidden-match" id="match-col-1">
      <div class="match-header" style="border-top-color: var(--accent2)">
        <button class="remove-match-btn" id="remove-1" onclick="removeMatch(1)" title="Remove Match 2">✕</button>
        <div class="match-title-row">
          <div class="match-label" id="match-label-1">MATCH 2</div>
          <button class="edit-match-btn" onclick="openEditMatch(1)" title="Edit match details">✎</button>
        </div>
        <div class="match-teams" id="match-teams-1"></div>
        <div class="match-local-time" id="match-clock-1">--:--:--</div>
        <div class="match-tz-row">
          <span class="match-tz-label">TZ</span>
          <select class="match-tz-select" id="match-tz-1" onchange="updateMatchTz(1)"></select>
        </div>
      </div>
      <div class="timers-list" id="timers-1"></div>
      <button class="add-timer-btn" onclick="openAddTimer(1)">+ ADD TIMER</button>
    </div>

    <!-- Match 3 (hidden on startup) -->
    <div class="match-col hidden-match" id="match-col-2">
      <div class="match-header" style="border-top-color: #9b59b6">
        <button class="remove-match-btn" id="remove-2" onclick="removeMatch(2)" title="Remove Match 3">✕</button>
        <div class="match-title-row">
          <div class="match-label" id="match-label-2">MATCH 3</div>
          <button class="edit-match-btn" onclick="openEditMatch(2)" title="Edit match details">✎</button>
        </div>
        <div class="match-teams" id="match-teams-2"></div>
        <div class="match-local-time" id="match-clock-2">--:--:--</div>
        <div class="match-tz-row">
          <span class="match-tz-label">TZ</span>
          <select class="match-tz-select" id="match-tz-2" onchange="updateMatchTz(2)"></select>
        </div>
      </div>
      <div class="timers-list" id="timers-2"></div>
      <button class="add-timer-btn" onclick="openAddTimer(2)">+ ADD TIMER</button>
    </div>

    <!-- Add Match button -->
    <div id="add-match-col">
      <button class="add-match-btn" id="add-match-btn" onclick="addMatch()">
        <span class="add-match-plus">+</span>
        <span class="add-match-label">ADD<br>MATCH</span>
      </button>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div id="status-bar">
    <span><span class="status-dot"></span>LIVE</span>
    <span id="utc-display">UTC --:--:--</span>
    <span>TAP TIME TO SET &nbsp;|&nbsp; TAP + TO ADD TIMER</span>
  </div>
</div>

<!-- MODAL: Set Timer Time -->
<div class="modal-overlay hidden" id="modal-set-time">
  <div class="modal">
    <div class="modal-title" id="modal-set-title">SET TIME</div>
    <div class="modal-field">
      <label>Local Time (24hr)</label>
      <div class="time-picker-row">
        <input class="modal-input time-text" type="text" id="modal-set-typed"
          placeholder="HH:MM" maxlength="5" inputmode="numeric"
          oninput="syncTypedToDropdowns('set')" />
        <span class="time-colon">or select</span>

// ── TIME HELPERS ──
function getTimeInTz(tz) {
  return new Date().toLocaleTimeString('en-GB', { timeZone: tz, hour12: false });
}

function getTimeHHMM(tz) {
  return new Date().toLocaleTimeString('en-GB', { timeZone: tz, hour12: false, hour: '2-digit', minute: '2-digit' });
}

// Convert HH:MM local (in given tz) to UTC ms (next occurrence)
function localTimeStrToUTC(timeStr, tz) {
  if (!timeStr) return null;
  const [h, m] = timeStr.split(':').map(Number);
  const now = new Date();

  // Get the current date in the target timezone as YYYY-MM-DD
  const dateStr = now.toLocaleDateString('en-CA', { timeZone: tz });
  const [year, month, day] = dateStr.split('-').map(Number);

  // Get the UTC offset for this timezone right now using a reliable method:
  // Format "now" in the target tz, parse it, compare to actual UTC
  const fmt = new Intl.DateTimeFormat('en-GB', {
    timeZone: tz,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  });
  const parts = fmt.formatToParts(now);
  const p = {};
  parts.forEach(x => { p[x.type] = x.value; });

  // Reconstruct "now" as UTC from the tz-local representation
  const tzNowUTC = Date.UTC(
    parseInt(p.year), parseInt(p.month) - 1, parseInt(p.day),
    parseInt(p.hour), parseInt(p.minute), parseInt(p.second)
  );
  // The offset in ms: how far ahead/behind UTC this tz is right now
  const offsetMs = tzNowUTC - now.getTime();

  // Build the target time in UTC: treat the local HH:MM as UTC midnight + offset correction
  const targetLocalMs = Date.UTC(year, month - 1, day, h, m, 0);
  const targetUTC = targetLocalMs - offsetMs;

  return targetUTC;
}

// Format countdown ms
function formatCountdown(diffMs) {
  const abs = Math.abs(diffMs);
  const totalSec = Math.floor(abs / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const sign = diffMs < 0 ? '+' : '-';
  if (h > 0) return `${sign}${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${sign}${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── RENDER ──
function renderTimers() {
  for (let mi = 0; mi < 3; mi++) {
    const list = document.getElementById(`timers-${mi}`);
    const now = Date.now();

    // Clear and rebuild
    list.innerHTML = '';
    matchTimers[mi].forEach(timer => {
      const row = document.createElement('div');
      row.className = 'timer-row ' + (timer.core ? 'core' : 'optional');

      const diffMs = timer.targetUTC ? timer.targetUTC - now : null;

      // Status class
      if (diffMs !== null) {
        if (diffMs < 0) row.classList.add('countdown-live');
        else if (diffMs < 5 * 60 * 1000) row.classList.add('countdown-warning');
      }

      // Name
      const nameEl = document.createElement('div');
      nameEl.className = 'timer-name';
      nameEl.textContent = timer.name;

      // Set time display
      const setEl = document.createElement('div');
      setEl.className = 'timer-time-set';
      setEl.textContent = timer.timeStr || '--:--';
      setEl.onclick = () => openSetTime(mi, timer.id);

      // Countdown
      const cdEl = document.createElement('div');
      cdEl.className = 'timer-countdown';
      if (diffMs === null) {
        cdEl.textContent = '--:--';
        cdEl.classList.add('past');
      } else if (diffMs < 0) {
        cdEl.textContent = formatCountdown(diffMs);
        cdEl.classList.add('live');
      } else if (diffMs < 5 * 60 * 1000) {
        cdEl.textContent = formatCountdown(diffMs);
        cdEl.classList.add('warning');
      } else {
        cdEl.textContent = formatCountdown(diffMs);
        cdEl.classList.add('positive');
      }

      // Remove (optional only)
      const rmEl = document.createElement('button');
      rmEl.className = 'timer-remove';
      rmEl.textContent = '✕';
      rmEl.onclick = (e) => { e.stopPropagation(); removeTimer(mi, timer.id); };

      row.appendChild(nameEl);
      row.appendChild(setEl);
      row.appendChild(cdEl);
      if (!timer.core) row.appendChild(rmEl);

      list.appendChild(row);
    });
  }
}

// Sync typed input → dropdowns (auto-format as user types)
function syncTypedToDropdowns(prefix) {
  const input = document.getElementById(`modal-${prefix}-typed`);
  const raw = input.value.replace(/[^0-9:]/g, '');
  // Auto-insert colon after 2 digits if no colon yet
  let formatted = raw;
  if (!raw.includes(':') && raw.length > 2) {
    formatted = raw.slice(0, 2) + ':' + raw.slice(2, 4);
    input.value = formatted;
  }
  // Sync to dropdowns as soon as we have HH:MM
  const parts = formatted.split(':');
  if (parts.length === 2 && parts[1].length >= 2) {
    const h = parseInt(parts[0]), m = parseInt(parts[1]);
    if (!isNaN(h) && h >= 0 && h <= 23) document.getElementById(`modal-${prefix}-hh`).value = String(h).padStart(2,'0');
    if (!isNaN(m) && m >= 0 && m <= 59) document.getElementById(`modal-${prefix}-mm`).value = String(m).padStart(2,'0');
  }
}

// Sync dropdowns → typed input
function syncDropdownsToTyped(prefix) {
  const hh = document.getElementById(`modal-${prefix}-hh`).value;
  const mm = document.getElementById(`modal-${prefix}-mm`).value;
  document.getElementById(`modal-${prefix}-typed`).value = `${hh}:${mm}`;
}

// Resolve final HH:MM — handles 1515, 15:15, 9:05, 905, etc.
function resolveTimeVal(prefix) {
  let typed = document.getElementById(`modal-${prefix}-typed`).value.trim();

  // Strip non-numeric except colon
  const digits = typed.replace(/[^0-9]/g, '');

  let h, m;
  if (digits.length === 3) {
    // e.g. 915 → 9:15
    h = parseInt(digits.slice(0, 1));
    m = parseInt(digits.slice(1, 3));
  } else if (digits.length === 4) {
    // e.g. 1515 → 15:15
    h = parseInt(digits.slice(0, 2));
    m = parseInt(digits.slice(2, 4));
  } else if (digits.length === 2) {
    // e.g. 15 → 15:00
    h = parseInt(digits);
    m = 0;
  } else if (typed.includes(':')) {
    // Already formatted as HH:MM
    const parts = typed.split(':');
    h = parseInt(parts[0]);
    m = parseInt(parts[1]);
  }

  if (h !== undefined && !isNaN(h) && !isNaN(m) && h >= 0 && h <= 23 && m >= 0 && m <= 59) {
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }

  // Last fallback: use dropdowns directly
  const hh = document.getElementById(`modal-${prefix}-hh`).value;
  const mm = document.getElementById(`modal-${prefix}-mm`).value;
  if (hh && mm) return `${hh}:${mm}`;
  return null;
}

// Get device local time as HH:MM string
function localNowHHMM() {
  const now = new Date();
  return String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}

}

document.getElementById('match-tz-0').value = matchTzs[0];
document.getElementById('match-tz-1').value = matchTzs[1];
document.getElementById('match-tz-2').value = matchTzs[2];

// ── FONT SCALING ──
// Scale clock and team text to fit column width
function scaleMatchFonts() {
  for (let i = 0; i < 3; i++) {
    const col = document.getElementById(`match-col-${i}`);
    if (!col || col.classList.contains('hidden-match')) continue;
    const header = col.querySelector('.match-header');
    if (!header) continue;
    const availW = header.clientWidth - 24; // 12px padding each side

    // Scale clock: target ~80% of available width for HH:MM:SS (8 chars)
    const clockEl = document.getElementById(`match-clock-${i}`);
    if (clockEl) {
      let fs = Math.floor(availW / 5.2); // ~5.2px per char at scale 1
      fs = Math.max(14, Math.min(fs, 38));
      clockEl.style.fontSize = fs + 'px';
    }

    // Scale teams: target ~90% of available width
    const teamsEl = document.getElementById(`match-teams-${i}`);
    if (teamsEl && teamsEl.children.length) {
      let fs = Math.floor(availW / 7);
      fs = Math.max(10, Math.min(fs, 28));
      teamsEl.style.fontSize = fs + 'px';
    }

    // Scale timer rows
    const timerRows = col.querySelectorAll('.timer-row');
    timerRows.forEach(row => {
      const rowW = row.clientWidth - 20;
      let fs = Math.max(9, Math.min(Math.floor(rowW / 28), 13));
      row.querySelectorAll('.timer-name').forEach(el => el.style.fontSize = fs + 'px');
      let cdFs = Math.max(10, Math.min(Math.floor(rowW / 20), 16));
      row.querySelectorAll('.timer-countdown').forEach(el => el.style.fontSize = cdFs + 'px');
      let tsFs = Math.max(9, Math.min(Math.floor(rowW / 24), 14));
      row.querySelectorAll('.timer-time-set').forEach(el => el.style.fontSize = tsFs + 'px');
    });
  }
}

// Watch for column size changes
const resizeObserver = new ResizeObserver(() => scaleMatchFonts());
document.querySelectorAll('.match-col').forEach(col => resizeObserver.observe(col));

</script>
